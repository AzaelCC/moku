services:
  backend:
    image: moku-backend:local
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      MOKU_DATABASE_URL: postgresql+asyncpg://moku:moku@postgres:5432/moku
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${MOKU_BACKEND_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    image: moku-backend:local
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    working_dir: /app/apps/backend
    command: ["alembic", "upgrade", "head"]
    environment:
      MOKU_DATABASE_URL: postgresql+asyncpg://moku:moku@postgres:5432/moku
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: moku
      POSTGRES_USER: moku
      POSTGRES_PASSWORD: moku
    ports:
      - "${MOKU_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moku -d moku"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
